services:
  bd:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bd_clientes
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=y
      - MSSQL_SA_PASSWORD=Upt.2022
    volumes:
      - ./ServicioCliente/db:/tmp

  api:
    build: ./ClienteAPI
    container_name: api_clientes
    ports:
      - "8080:8080"
    environment:
      # Corregido: Server=bd (debe coincidir con el nombre del servicio arriba)
      - ConnectionStrings__ClienteDB=Server=bd;Database=BD_CLIENTES;User Id=sa;Password=Upt.2022;TrustServerCertificate=true
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - bd